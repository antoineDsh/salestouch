interface:
  display_name: "LinkedIn Message Writer"
  short_description: "Generate 3 LinkedIn variants via parallel subagents"
  default_prompt: "Use $linkedin-message-writer. Orchestrate 3 parallel Task calls to subagent_type linkedin-message-sonnet-creative with model claude-sonnet-4-5, pass lead_id in each Task input, and send a rich per-variant writing brief (angle, personalization hooks, useful points, tone/CTA intent) for this specific lead. Vary the briefs meaningfully across the 3 calls, then aggregate into linkedin_message_variants_v2 only."
